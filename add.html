<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dodaj książkę – Biblioteka</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">📚 Biblioteka</a>
      <a href="index.html" class="btn-secondary">← Powrót</a>
    </div>
  </header>

  <main>
    <section class="hero small">
      <h1>Dodaj nową książkę</h1>
      <p>Wypełnij formularz, aby dodać książkę do kolekcji.</p>
    </section>

    <div class="form-wrapper">
      <div id="successMsg" class="alert-success" style="display:none;">
        ✅ Książka została dodana! <a href="index.html">Zobacz listę →</a>
      </div>
      <div id="errorMsg" class="alert-error" style="display:none;">
        ❌ Wystąpił błąd. Spróbuj ponownie.
      </div>

      <div class="form-group">
        <label for="title">Tytuł *</label>
        <input type="text" id="title" placeholder="np. Wiedźmin" />
      </div>

      <div class="form-group">
        <label for="author">Autor *</label>
        <input type="text" id="author" placeholder="np. Andrzej Sapkowski" />
      </div>

      <div class="form-group">
        <label for="year">Rok wydania</label>
        <input type="number" id="year" placeholder="np. 1993" min="1000" max="2099" />
      </div>

      <div class="form-group">
        <label for="genre">Gatunek</label>
        <select id="genre">
          <option value="">— wybierz —</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Science Fiction">Science Fiction</option>
          <option value="Kryminał">Kryminał</option>
          <option value="Romans">Romans</option>
          <option value="Historia">Historia</option>
          <option value="Biografia">Biografia</option>
          <option value="Inne">Inne</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Opis</label>
        <textarea id="description" rows="4" placeholder="Krótki opis książki..."></textarea>
      </div>

      <button class="btn-primary full-width" id="submitBtn" onclick="addBook()">
        Dodaj książkę
      </button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDURohJjc_YOpBLqeSo1ATamrXNkByVkD4",
      authDomain: "biblioteka-77290.firebaseapp.com",
      projectId: "biblioteka-77290",
      storageBucket: "biblioteka-77290.firebasestorage.app",
      messagingSenderId: "514973497921",
      appId: "1:514973497921:web:a1f7e703a3542af3af24c0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.addBook = async function() {
      const title = document.getElementById("title").value.trim();
      const author = document.getElementById("author").value.trim();
      const year = document.getElementById("year").value.trim();
      const genre = document.getElementById("genre").value;
      const description = document.getElementById("description").value.trim();

      const successMsg = document.getElementById("successMsg");
      const errorMsg = document.getElementById("errorMsg");
      const btn = document.getElementById("submitBtn");

      successMsg.style.display = "none";
      errorMsg.style.display = "none";

      if (!title || !author) {
        errorMsg.textContent = "❌ Tytuł i autor są wymagane!";
        errorMsg.style.display = "block";
        return;
      }

      btn.textContent = "Dodawanie...";
      btn.disabled = true;

      try {
        await addDoc(collection(db, "books"), {
          title,
          author,
          year: year ? parseInt(year) : null,
          genre: genre || null,
          description: description || null,
          createdAt: serverTimestamp()
        });

        successMsg.style.display = "block";
        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("year").value = "";
        document.getElementById("genre").value = "";
        document.getElementById("description").value = "";

      } catch (err) {
        console.error(err);
        errorMsg.style.display = "block";
      }

      btn.textContent = "Dodaj książkę";
      btn.disabled = false;
    };
  </script>
</body>
</html>
