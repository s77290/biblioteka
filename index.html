<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biblioteka</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">📚 Biblioteka</a>
      <div class="header-actions">
        <button class="btn-icon" id="themeToggle" title="Zmień motyw">🌙</button>
        <a href="add.html" class="btn-primary">+ Dodaj książkę</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Twoja kolekcja książek</h1>
      <p>Przechowuj, przeglądaj i zarządzaj swoimi książkami w jednym miejscu.</p>
    </section>

    <div class="toolbar">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Szukaj po tytule lub autorze..." />
      </div>
      <button class="btn-secondary" id="randomBtn">🎲 Wylosuj książkę</button>
      <button class="btn-secondary" id="statsBtn">📊 Statystyki</button>
    </div>

    <div id="statsPanel" class="stats-panel" style="display:none;">
      <h3>Książki według gatunku</h3>
      <div id="statsChart" class="stats-chart"></div>
    </div>

    <div id="bookCount" class="book-count"></div>
    <div id="bookList" class="book-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <p>📖 Brak książek. <a href="add.html">Dodaj pierwszą!</a></p>
    </div>
  </main>

  <!-- Modal detalów -->
  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <img id="modalCover" class="modal-cover" style="display:none;" />
      <h2 id="modalTitle"></h2>
      <p class="modal-author" id="modalAuthor"></p>
      <p class="modal-year" id="modalYear"></p>
      <p class="modal-rating" id="modalRating"></p>
      <p class="modal-desc" id="modalDesc"></p>
      <button class="btn-danger" id="modalDeleteBtn">🗑 Usuń książkę</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDURohJjc_YOpBLqeSo1ATamrXNkByVkD4",
      authDomain: "biblioteka-77290.firebaseapp.com",
      projectId: "biblioteka-77290",
      storageBucket: "biblioteka-77290.firebasestorage.app",
      messagingSenderId: "514973497921",
      appId: "1:514973497921:web:a1f7e703a3542af3af24c0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allBooks = [];
    let currentDeleteId = null;

    // --- Dark mode ---
    const themeToggle = document.getElementById("themeToggle");
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
    }
    const savedTheme = localStorage.getItem("biblioteka-theme") || "light";
    applyTheme(savedTheme);
    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(current);
      localStorage.setItem("biblioteka-theme", current);
    });

    async function loadBooks() {
      const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      allBooks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderBooks(allBooks);
    }

    function starsHtml(rating) {
      if (!rating) return "";
      let html = "";
      for (let i = 1; i <= 5; i++) {
        html += `<span class="star-display ${i <= rating ? "filled" : ""}">★</span>`;
      }
      return `<div class="book-rating">${html}</div>`;
    }

    function renderBooks(books) {
      const grid = document.getElementById("bookList");
      const empty = document.getElementById("emptyState");
      const count = document.getElementById("bookCount");

      grid.innerHTML = "";

      if (books.length === 0) {
        empty.style.display = "block";
        count.textContent = "";
        return;
      }

      empty.style.display = "none";
      count.textContent = `Znaleziono: ${books.length} książek`;

      books.forEach(book => {
        const card = document.createElement("div");
        card.className = "book-card";
        const coverHtml = book.coverUrl
          ? `<img src="${book.coverUrl}" class="book-cover" onerror="this.style.display='none'" />`
          : `<div class="book-cover-placeholder">📕</div>`;
        card.innerHTML = `
          ${coverHtml}
          <div class="book-card-inner">
            <span class="book-year">${book.year || "—"}</span>
            <h3>${book.title}</h3>
            <p class="book-author">✍ ${book.author}</p>
            ${starsHtml(book.rating)}
            <p class="book-desc">${book.description ? book.description.substring(0, 80) + "..." : "Brak opisu."}</p>
            <button class="btn-details">Zobacz szczegóły →</button>
          </div>
        `;
        card.querySelector(".btn-details").addEventListener("click", () => openModal(book));
        grid.appendChild(card);
      });
    }

    function openModal(book) {
      const cover = document.getElementById("modalCover");
      if (book.coverUrl) {
        cover.src = book.coverUrl;
        cover.style.display = "block";
        cover.onerror = () => cover.style.display = "none";
      } else {
        cover.style.display = "none";
      }
      document.getElementById("modalTitle").textContent = book.title;
      document.getElementById("modalAuthor").textContent = "Autor: " + book.author;
      document.getElementById("modalYear").textContent = book.year ? "Rok: " + book.year : "";
      document.getElementById("modalRating").innerHTML = starsHtml(book.rating);
      document.getElementById("modalDesc").textContent = book.description || "Brak opisu.";
      currentDeleteId = book.id;
      document.getElementById("modal").style.display = "flex";
    }

    window.closeModal = function() {
      document.getElementById("modal").style.display = "none";
    };

    document.getElementById("modalDeleteBtn").addEventListener("click", async () => {
      if (!currentDeleteId) return;
      if (!confirm("Czy na pewno chcesz usunąć tę książkę?")) return;
      await deleteDoc(doc(db, "books", currentDeleteId));
      closeModal();
      loadBooks();
    });

    document.getElementById("searchInput").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      const filtered = allBooks.filter(b =>
        b.title.toLowerCase().includes(q) ||
        b.author.toLowerCase().includes(q)
      );
      renderBooks(filtered);
    });

    // --- Random book ---
    document.getElementById("randomBtn").addEventListener("click", () => {
      if (allBooks.length === 0) {
        alert("Brak książek w bazie!");
        return;
      }
      const random = allBooks[Math.floor(Math.random() * allBooks.length)];
      openModal(random);
    });

    // --- Stats (genre chart) ---
    document.getElementById("statsBtn").addEventListener("click", () => {
      const panel = document.getElementById("statsPanel");
      if (panel.style.display === "none") {
        renderStats();
        panel.style.display = "block";
      } else {
        panel.style.display = "none";
      }
    });

    function renderStats() {
      const counts = {};
      allBooks.forEach(b => {
        const genre = b.genre || "Nieokreślony";
        counts[genre] = (counts[genre] || 0) + 1;
      });
      const max = Math.max(...Object.values(counts), 1);
      const chart = document.getElementById("statsChart");
      chart.innerHTML = "";
      Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .forEach(([genre, num]) => {
          const row = document.createElement("div");
          row.className = "stats-row";
          row.innerHTML = `
            <span class="stats-label">${genre}</span>
            <div class="stats-bar-track">
              <div class="stats-bar-fill" style="width:${(num / max) * 100}%"></div>
            </div>
            <span class="stats-value">${num}</span>
          `;
          chart.appendChild(row);
        });
    }

    loadBooks();
  </script>
</body>
</html>
